<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>LP</title>

<style>
:root{
  --pink:#ff2d75;
  --pink2:#ff4aa0;
  --safe-bottom: env(safe-area-inset-bottom);
}
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family: system-ui, -apple-system, sans-serif;
  overflow:hidden;
}

/* ===== Video ===== */
.stage{position:fixed;inset:0;}
video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* ===== Right UI ===== */
.rightRail{
  position:fixed;
  right:14px;
  top:12%;
  display:flex;
  flex-direction:column;
  gap:16px;
  z-index:50;
}
.railBtn{
  width:50px;height:50px;
  border-radius:999px;
  background:rgba(0,0,0,.45);
  display:grid;place-items:center;
  font-size:18px;
  cursor:pointer;
}
.actionItem{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
}
.count{opacity:.85;font-weight:700;}

/* ===== Bottom Bar ===== */
.bottomArea{
  position:fixed;
  left:0;right:0;bottom:0;
  padding:10px 12px calc(10px + var(--safe-bottom));
  background:linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,0));
}
.progressRow{
  display:flex;align-items:center;gap:10px;
}
.progress{
  flex:1;height:4px;background:#444;
  position:relative;border-radius:999px;
}
.bar{
  position:absolute;height:100%;
  background:linear-gradient(90deg,var(--pink),var(--pink2));
  width:0%;
}
.time{font-size:12px;opacity:.8;}

/* ===== Modal ===== */
.modal{
  position:fixed;inset:0;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);
}
.modal.show{display:flex;}
.modalCard{
  background:#fff;color:#111;
  padding:20px;
  border-radius:16px;
  text-align:center;
  width:90%;
  max-width:380px;
}
.modalBtn{
  display:inline-block;
  margin-top:12px;
  background:var(--pink);
  color:#fff;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
}

/* ===== Floating X ===== */
#floatingX{
  position:fixed;
  right:18px;
  bottom:calc(90px + var(--safe-bottom));
  width:60px;height:60px;
  border-radius:999px;
  overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,.6);
  cursor:pointer;
  z-index:60;
}
#floatingX img{
  width:100%;height:100%;object-fit:cover;
}
.xFollowers{
  position:absolute;
  bottom:-22px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  font-weight:700;
  color:#1da1f2;
}
</style>
</head>

<body>

<div class="stage">
  <video id="v" playsinline muted>
    <source src="./video.mp4" type="video/mp4">
  </video>
</div>

<!-- Right Rail -->
<div class="rightRail">
  <div class="railBtn" id="btnLike">♡</div>
  <div class="actionItem"><div class="count">805</div></div>

  <div class="railBtn" id="btnSave">🔖</div>
  <div class="actionItem"><div class="count">579</div></div>

  <div class="railBtn" id="btnComment">💬</div>
  <div class="actionItem"><div class="count">180</div></div>
</div>

<!-- Bottom -->
<div class="bottomArea">
  <div class="progressRow">
    <div id="btnPlay">▶</div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="time" id="time">0:00</div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modalCard">
    <div style="font-weight:800;font-size:18px;">ようこそゲストさん。</div>
    <div style="margin-top:6px;font-size:13px;">
      アプリがインストールされていません。
    </div>
    <a href="https://ad-nex.com/u/aiacgdx3w5rq" class="modalBtn">
      ストアでインストール
    </a>
  </div>
</div>

<!-- Floating X -->
<div id="floatingX"
     onclick="location.href='https://x.com/tyui33601530'">
  <img src="./x-logo-studio-letter-x-design-icon-logotype-technology-font-vector.jpg">
  <div class="xFollowers">17K</div>
</div>

<script>
const v=document.getElementById("v");
const bar=document.getElementById("bar");
const time=document.getElementById("time");
const btnPlay=document.getElementById("btnPlay");
const modal=document.getElementById("modal");

function fmt(t){
  const m=Math.floor(t/60);
  const s=Math.floor(t%60);
  return m+":"+String(s).padStart(2,"0");
}

v.addEventListener("timeupdate",()=>{
  const pct=(v.currentTime/v.duration)*100;
  bar.style.width=pct+"%";
  time.textContent=fmt(v.currentTime);
});

v.addEventListener("ended",()=>{
  modal.classList.add("show");
});

btnPlay.onclick=()=>{
  if(v.paused){v.play();btnPlay.textContent="Ⅱ";}
  else{v.pause();btnPlay.textContent="▶";}
};

v.onclick=()=>{ if(v.paused)v.play(); else v.pause(); };

window.onload=()=>{
  setTimeout(()=>modal.classList.add("show"),400);
};
</script>

</body>
</html>
