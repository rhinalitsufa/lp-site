<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>LP</title>

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.75);
      --line:rgba(255,255,255,.18);
      --pink:#ff2d75;
      --pink2:#ff4aa0;
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif;
      overflow:hidden;
    }

    /* ===== Video ===== */
    .stage{
      position:fixed;
      inset:0;
      background:#000;
    }
    video#v{
      width:100%;
      height:100%;
      background:#000;
      display:block;

      /* ★ドアップ防止：黒帯でOKなら contain */
      object-fit:contain;
    }

    /* クリック拾うための層 */
    .tapLayer{
      position:fixed;
      inset:0;
      z-index:5;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Top Left UI (保存/インストール) ===== */
    .topLeft{
      position:fixed;
      left:14px;
      top: calc(12px + var(--safe-top));
      z-index:20;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:auto;
    }
    .saveRow{
      display:flex;
      align-items:center;
      gap:8px;
      color:rgba(255,255,255,.9);
      font-size:13px;
      user-select:none;
      text-shadow: 0 8px 20px rgba(0,0,0,.55);
    }
    .saveRow .star{
      width:18px;height:18px;
      display:grid;place-items:center;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.55));
    }
    .installBtn{
      width:min(320px, 76vw);
      height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background: linear-gradient(90deg, var(--pink), var(--pink2));
      color:#fff;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 14px 0 16px;
      box-shadow: var(--shadow);
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .installBtn:active{ transform:scale(.99); }
    .installBtn .arrow{
      opacity:.9;
      font-weight:900;
    }
    .captionLine{
      font-size:12px;
      color:rgba(255,255,255,.9);
      text-shadow: 0 8px 20px rgba(0,0,0,.55);
      line-height:1.35;
      max-width:min(360px, 80vw);
    }

    /* ===== Bottom Controls (まねる部分) ===== */
    .bottomWrap{
      position:fixed;
      left:0; right:0; bottom:0;
      z-index:30;
      pointer-events:none; /* ここは基本透過、ボタンだけ有効にする */
      background: linear-gradient(to top, rgba(0,0,0,.60), rgba(0,0,0,0));
      padding: 10px 14px calc(12px + var(--safe-bottom));
    }

    .controlsRow{
      display:flex;
      align-items:center;
      gap:10px;
      pointer-events:auto;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .ppBtn{
      width:34px;height:34px;
      border-radius:999px;
      display:grid;place-items:center;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      cursor:pointer;
    }
    .ppBtn svg{ width:18px;height:18px; }

    .progress{
      flex:1;
      height:6px;
      border-radius:999px;
      background: rgba(255,255,255,.20);
      overflow:hidden;
      position:relative;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25) inset;
    }
    .progress .bar{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
    }

    .time{
      min-width:72px;
      text-align:right;
      font-size:12px;
      color:rgba(255,255,255,.85);
      font-variant-numeric: tabular-nums;
      text-shadow: 0 8px 20px rgba(0,0,0,.55);
    }

    /* ===== Bottom Nav ===== */
    .navRow{
      margin-top:10px;
      display:flex;
      justify-content:space-around;
      align-items:flex-end;
      gap:8px;
      pointer-events:auto;
    }
    .navItem{
      width:72px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      color:rgba(255,255,255,.75);
      font-size:11px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      padding:8px 0;
      cursor:pointer;
    }
    .navItem.active{
      color:#fff;
      position:relative;
    }
    .navItem.active::after{
      content:"";
      position:absolute;
      left:10px; right:10px;
      bottom:-2px;
      height:2px;
      background:#fff;
      opacity:.85;
      border-radius:999px;
    }
    .navIcon{
      width:22px;height:22px;
      opacity:.92;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.55));
    }

    /* ===== Modal (右UIクリックで出すやつにも使える) ===== */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      background: rgba(0,0,0,.55);
      z-index:9999;
      pointer-events:auto;
    }
    .modal.show{ display:flex; }
    .modalCard{
      width:min(520px, 92vw);
      background:#fff;
      color:#111;
      border-radius:18px;
      padding:18px 18px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      position:relative;
      text-align:center;
    }
    .modalClose{
      position:absolute;
      right:12px;
      top:10px;
      border:none;
      background:transparent;
      font-size:22px;
      cursor:pointer;
      color:#666;
    }
    .modalTitle{
      margin:6px 0 8px;
      font-size:18px;
      font-weight:900;
    }
    .modalText{
      margin:0 0 14px;
      color:#555;
      font-size:13px;
      line-height:1.6;
    }
    .modalBtn{
      display:inline-block;
      background: var(--pink);
      color:#fff;
      text-decoration:none;
      font-weight:900;
      padding:12px 18px;
      border-radius:999px;
    }
    .modalBtn:active{ transform:scale(.99); }
  </style>
</head>

<body>
  <div class="stage">
    <video id="v" playsinline muted preload="metadata">
      <source id="src" src="./video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 画面タップで再生/停止（UIの邪魔しないように JS で判定） -->
  <div class="tapLayer" id="tapLayer" aria-label="tap to play/pause"></div>

  <!-- 左上UI -->
  <div class="topLeft">
    <div class="saveRow" id="saveBtn">
      <span class="star">★</span>
      <span>保存する ›</span>
    </div>

    <div class="installBtn" id="installBtn">
      <span>インストールして視聴する</span>
      <span class="arrow">›</span>
    </div>

    <div class="captionLine">
      【📣 24時間限定 3日間だけ無料プレゼント🎁 】この映像を見つけた
    </div>
  </div>

  <!-- 下UI -->
  <div class="bottomWrap">
    <div class="controlsRow">
      <div class="ppBtn" id="ppBtn" aria-label="play pause">
        <!-- icon will be swapped -->
        <svg id="ppIcon" viewBox="0 0 24 24" fill="none">
          <path d="M8 5v14l11-7-11-7z" fill="white"/>
        </svg>
      </div>

      <div class="progress" id="progress" aria-label="progress bar">
        <div class="bar" id="bar"></div>
      </div>

      <div class="time" id="time">0:00 / 0:00</div>
    </div>

    <div class="navRow">
      <div class="navItem active" data-nav="home">
        <svg class="navIcon" viewBox="0 0 24 24" fill="none">
          <path d="M4 10.5l8-7 8 7V20a1 1 0 0 1-1 1h-5v-7H10v7H5a1 1 0 0 1-1-1v-9.5z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div>ホーム</div>
      </div>

      <div class="navItem" data-nav="boost">
        <svg class="navIcon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2l3 7 7 .5-5.5 4.5 2 7-6.5-4-6.5 4 2-7L2 9.5 9 9l3-7z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div>ブースト</div>
      </div>

      <div class="navItem" data-nav="rank">
        <svg class="navIcon" viewBox="0 0 24 24" fill="none">
          <path d="M4 20V10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 20V4" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 20v-8" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M22 20v-13" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>ランキング</div>
      </div>

      <div class="navItem" data-nav="msg">
        <svg class="navIcon" viewBox="0 0 24 24" fill="none">
          <path d="M4 5h16v14H4V5z" stroke="white" stroke-width="2"/>
          <path d="M4 7l8 6 8-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>メッセージ</div>
      </div>

      <div class="navItem" data-nav="acct">
        <svg class="navIcon" viewBox="0 0 24 24" fill="none">
          <path d="M12 12a4 4 0 1 0-0.01 0z" stroke="white" stroke-width="2"/>
          <path d="M4 21a8 8 0 0 1 16 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>アカウント</div>
      </div>
    </div>
  </div>

  <!-- モーダル -->
  <div class="modal" id="modal">
    <div class="modalCard">
      <button class="modalClose" id="modalClose" aria-label="close">×</button>
      <h3 class="modalTitle">ようこそゲストさん。</h3>
      <p class="modalText">
        アプリがインストールされていません。<br>
        インストールをしてからお楽しみください。
      </p>
      <a class="modalBtn" id="modalBtn" href="#" rel="noopener">ストアでインストールする</a>
    </div>
  </div>

<script>
  /**
   * ここだけ変えればOK
   */
  const CONFIG = {
    videoSrc: "./video.mp4",                    // あなたのrepo直下ならこのまま
    ctaUrl: "https://ad-nex.com/u/aiacgdx3w5rq", // 遷移先
    startMuted: true
  };

  const v = document.getElementById("v");
  const src = document.getElementById("src");
  const tapLayer = document.getElementById("tapLayer");

  const ppBtn = document.getElementById("ppBtn");
  const ppIcon = document.getElementById("ppIcon");
  const progress = document.getElementById("progress");
  const bar = document.getElementById("bar");
  const timeEl = document.getElementById("time");

  const installBtn = document.getElementById("installBtn");
  const saveBtn = document.getElementById("saveBtn");

  const modal = document.getElementById("modal");
  const modalClose = document.getElementById("modalClose");
  const modalBtn = document.getElementById("modalBtn");

  // set src
  src.src = CONFIG.videoSrc;
  v.load();

  v.muted = !!CONFIG.startMuted;
  v.playsInline = true;
  v.preload = "metadata";

  // modal links
  modalBtn.href = CONFIG.ctaUrl;

  function openModal(){
    modal.classList.add("show");
  }
  function closeModal(){
    modal.classList.remove("show");
  }
  modalClose.addEventListener("click", (e)=>{ e.preventDefault(); e.stopPropagation(); closeModal(); });
  modal.addEventListener("click", (e)=>{ if(e.target === modal) closeModal(); });

  // mimic: top buttons -> modal
  installBtn.addEventListener("click", (e)=>{ e.stopPropagation(); openModal(); });
  saveBtn.addEventListener("click", (e)=>{ e.stopPropagation(); openModal(); });

  // play/pause icon
  function setPP(paused){
    ppIcon.innerHTML = paused
      ? `<path d="M8 5v14l11-7-11-7z" fill="white"/>`
      : `<path d="M7 5h3v14H7z" fill="white"/><path d="M14 5h3v14h-3z" fill="white"/>`;
  }

  function fmt(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return `${m}:${String(s).padStart(2,"0")}`;
  }

  function syncUI(){
    const dur = v.duration || 0;
    const cur = v.currentTime || 0;
    const pct = dur ? (cur/dur)*100 : 0;
    bar.style.width = `${pct}%`;
    timeEl.textContent = `${fmt(cur)} / ${fmt(dur)}`;
    setPP(v.paused);
  }

  // iPhone対策：最初の操作で play を試す
  const tryPlay = () => v.play().catch(()=>{});

  // 画面タップで再生/停止（ただしUIクリックは除外）
  tapLayer.addEventListener("pointerdown", (e)=>{
    // UIに触ってるなら無視
    const t = e.target;
    if (
      t.closest("#ppBtn") ||
      t.closest("#progress") ||
      t.closest("#installBtn") ||
      t.closest("#saveBtn") ||
      t.closest(".navItem") ||
      t.closest("#modal")
    ) return;

    if(v.paused) tryPlay();
    else v.pause();
  });

  // play/pause button
  ppBtn.addEventListener("pointerdown", (e)=>{
    e.preventDefault(); e.stopPropagation();
    if(v.paused) tryPlay();
    else v.pause();
  });

  // seek
  progress.addEventListener("pointerdown", (e)=>{
    e.preventDefault(); e.stopPropagation();
    const rect = progress.getBoundingClientRect();
    const x = Math.min(Math.max(0, e.clientX - rect.left), rect.width);
    const pct = rect.width ? x / rect.width : 0;
    const dur = v.duration || 0;
    if(dur) v.currentTime = dur * pct;
  });

  // bottom nav (全部モーダルにしておく)
  document.querySelectorAll(".navItem").forEach(el=>{
    el.addEventListener("pointerdown", (e)=>{
      e.preventDefault(); e.stopPropagation();
      openModal();
    });
  });

  // video events
  v.addEventListener("loadedmetadata", ()=>{
    syncUI();
    // ここで自動再生したいなら tryPlay();（ただし端末によってブロックされる）
  });
  v.addEventListener("timeupdate", syncUI);
  v.addEventListener("play", syncUI);
  v.addEventListener("pause", syncUI);
  v.addEventListener("ended", syncUI);

  // 読み込み失敗時
  v.addEventListener("error", ()=>{
    alert("動画が読み込めません。video.mp4 の場所/名前、mp4(H.264)形式を確認してね。");
  });
</script>
</body>
</html>
