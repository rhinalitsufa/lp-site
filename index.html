<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>LP</title>

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.75);
      --line:rgba(255,255,255,.14);
      --pink:#ff2d75;
      --blue:#1976ff;
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif;
      overflow:hidden;
    }

    /* ===== Video ===== */
    .stage{
      position:fixed;
      inset:0;
      background:#000;
      z-index:1;
    }
    video{
      width:100%;
      height:100%;
      object-fit:contain; /* ドアップ回避 */
      background:#000;
      display:block;
    }

    /* ===== Right rail (clickable) ===== */
    .right-rail{
      position: fixed;
      right: 14px;
      top: 14%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      z-index: 9999;         /* 重要 */
      pointer-events: auto;  /* 重要 */
    }
    .rail-bubble{
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      color:#fff;
      cursor:pointer;
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      font-size:18px;
    }
    .rail-bubble:active{ transform: scale(.98); }
    .rail-count{
      margin-top:-4px;
      font-size:12px;
      font-weight:800;
      color: rgba(255,255,255,.75);
      user-select:none;
    }
    .rail-avatar{
      width: 52px;
      height: 52px;
      border-radius: 999px;
      overflow:hidden;
      position: relative;
      display:block;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.35);
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .rail-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .avatar-plus{
      position:absolute;
      left:50%;
      bottom:-8px;
      transform: translateX(-50%);
      width:22px;
      height:22px;
      border-radius:999px;
      background:var(--pink);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      border:2px solid rgba(0,0,0,.65);
      font-size:14px;
    }

    /* ===== Top left back / top right share ===== */
    .topbar{
      position:fixed;
      left:0; right:0;
      top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: calc(10px + var(--safe-top)) 12px 10px;
      z-index: 9998;
      pointer-events:none;
    }
    .topbar .btn{
      pointer-events:auto;
      width:38px;height:38px;
      border-radius:999px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      display:grid;place-items:center;
      box-shadow: var(--shadow);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .topbar .btn:active{ transform:scale(.98); }

    /* ===== Bottom CTA & mini bar ===== */
    .bottomCta{
      position:fixed;
      left:50%;
      bottom: calc(22px + var(--safe-bottom));
      transform: translateX(-50%);
      background: var(--blue);
      color:#fff;
      text-decoration:none;
      font-weight:900;
      padding: 14px 22px;
      border-radius:12px;
      box-shadow: var(--shadow);
      z-index: 9999;
      white-space:nowrap;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      pointer-events:auto;
    }
    .bottomCta:active{ transform: translateX(-50%) scale(.99); }

    .miniPlayer{
      position:fixed;
      left:0; right:0;
      bottom:0;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
      z-index: 9990;
      pointer-events:none;
    }
    .miniRow{
      display:flex;
      align-items:center;
      gap:10px;
      opacity:.85;
      font-size:12px;
      color:var(--muted);
    }
    .miniBar{
      flex:1;
      height:4px;
      border-radius:999px;
      background: rgba(255,255,255,.18);
      overflow:hidden;
      position:relative;
    }
    .miniBar > i{
      position:absolute; inset:0 auto 0 0;
      width:0%;
      background: linear-gradient(90deg, var(--pink), rgba(255,255,255,.8));
    }
    .miniTime{
      font-variant-numeric: tabular-nums;
      min-width:52px;
      text-align:right;
    }

    /* ===== Install Modal ===== */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      background: rgba(0,0,0,.55);
      z-index: 10000;
      pointer-events:auto;
    }
    .modal.show{ display:flex; }
    .modal-card{
      width:min(520px, 92vw);
      background:#fff;
      color:#111;
      border-radius:18px;
      padding:18px 18px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      position:relative;
      text-align:center;
    }
    .modal-close{
      position:absolute;
      right:12px;
      top:10px;
      border:none;
      background:transparent;
      font-size:22px;
      cursor:pointer;
      color:#666;
    }
    .modal-title{
      margin:6px 0 8px;
      font-size:18px;
      font-weight:900;
    }
    .modal-text{
      margin:0 0 14px;
      color:#555;
      font-size:13px;
      line-height:1.6;
    }
    .modal-btn{
      display:inline-block;
      background: var(--pink);
      color:#fff;
      text-decoration:none;
      font-weight:900;
      padding:12px 18px;
      border-radius:999px;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .modal-btn:active{ transform:scale(.99); }
  </style>
</head>

<body>
  <!-- ===== Video stage ===== -->
  <div class="stage">
    <video id="v" playsinline muted preload="metadata">
      <source id="vSrc" src="./video.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ===== Topbar ===== -->
  <div class="topbar">
    <div class="btn" id="btnBack" title="Back" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="btn" id="btnShareTop" title="Share" aria-label="Share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 6l-4-4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 2v14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- ===== Right Rail ===== -->
  <div class="right-rail" id="rightRail">
    <button class="rail-bubble" id="btnShare" aria-label="share" title="Share">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 6l-4-4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 2v14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <a class="rail-avatar" id="xAvatar" href="#" aria-label="Open X profile" title="X profile">
      <img id="avatarImg" alt="avatar"
        src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png">
      <span class="avatar-plus">+</span>
    </a>

    <button class="rail-bubble" id="btnLike" aria-label="like" title="Like">♡</button>
    <div class="rail-count" id="likeCount">805</div>

    <button class="rail-bubble" id="btnSave" aria-label="save" title="Save">🔖</button>
    <div class="rail-count" id="saveCount">579</div>

    <button class="rail-bubble" id="btnComment" aria-label="comment" title="Comment">💬</button>
    <div class="rail-count" id="commentCount">180</div>

    <button class="rail-bubble" id="btnSound" aria-label="sound" title="Sound">🔇</button>
    <button class="rail-bubble" id="btnFs" aria-label="fullscreen" title="Fullscreen">⤢</button>
  </div>

  <!-- ===== Bottom CTA ===== -->
  <a class="bottomCta" id="cta" href="#" rel="noopener">アプリで見る</a>

  <!-- ===== Mini player ===== -->
  <div class="miniPlayer">
    <div class="miniRow">
      <span>▶</span>
      <div class="miniBar"><i id="miniBar"></i></div>
      <span class="miniTime" id="miniTime">0:00</span>
    </div>
  </div>

  <!-- ===== Modal ===== -->
  <div id="installModal" class="modal">
    <div class="modal-card">
      <button class="modal-close" id="modalClose" aria-label="close">×</button>
      <h3 class="modal-title" id="modalTitle">ようこそゲストさん。</h3>
      <p class="modal-text" id="modalText">
        アプリがインストールされていません。<br>
        インストールをしてからお楽しみください。
      </p>
      <a class="modal-btn" id="modalInstallBtn" href="#" rel="noopener">
        ストアでインストールする
      </a>
    </div>
  </div>

  <script>
    /**
     * =========================
     * 設定（ここだけ触ればOK）
     * =========================
     */
    const CONFIG = {
      videoSrc: "./video.mp4",
      ctaUrl: "https://ad-nex.com/u/aiacgdx3w5rq",
      xProfileUrl: "https://x.com/あなたのID",   // ←ここを自分のXリンクに

      stopAtSeconds: 0,  // 止めたくないなら 0 / 止めるなら秒
      loop: true,
      startMuted: true,

      counts: { like: 805, save: 579, comment: 180 },

      modalCopy: {
        defaultTitle: "ようこそゲストさん。",
        defaultText: "アプリがインストールされていません。<br>インストールをしてからお楽しみください。",
        likeText: "いいねするには、アプリのインストールが必要です。",
        saveText: "保存するには、アプリのインストールが必要です。",
        commentText: "コメントするには、アプリのインストールが必要です。",
        soundText: "音声を有効にするには、アプリのインストールが必要です。"
      }
    };

    // ===== Elements =====
    const v = document.getElementById("v");
    const vSrc = document.getElementById("vSrc");
    const cta = document.getElementById("cta");

    const likeCount = document.getElementById("likeCount");
    const saveCount = document.getElementById("saveCount");
    const commentCount = document.getElementById("commentCount");

    const btnLike = document.getElementById("btnLike");
    const btnSave = document.getElementById("btnSave");
    const btnComment = document.getElementById("btnComment");
    const btnSound = document.getElementById("btnSound");
    const btnFs = document.getElementById("btnFs");
    const btnShare = document.getElementById("btnShare");
    const btnShareTop = document.getElementById("btnShareTop");
    const xAvatar = document.getElementById("xAvatar");
    const btnBack = document.getElementById("btnBack");

    const miniBar = document.getElementById("miniBar");
    const miniTime = document.getElementById("miniTime");

    const modal = document.getElementById("installModal");
    const modalClose = document.getElementById("modalClose");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const modalInstallBtn = document.getElementById("modalInstallBtn");

    // ===== Init =====
    // video
    vSrc.src = CONFIG.videoSrc;
    v.load();
    v.muted = !!CONFIG.startMuted;
    v.loop = !!CONFIG.loop;
    v.playsInline = true;
    v.preload = "metadata";

    // links
    cta.href = CONFIG.ctaUrl;
    modalInstallBtn.href = CONFIG.ctaUrl;
    xAvatar.href = CONFIG.xProfileUrl;

    // counts
    likeCount.textContent = CONFIG.counts.like;
    saveCount.textContent = CONFIG.counts.save;
    commentCount.textContent = CONFIG.counts.comment;

    // iPhone対策：1回タップで再生開始を確実に
    const tryPlay = () => v.play().catch(()=>{});
    document.addEventListener("click", tryPlay, { passive:true });

    // progress
    function fmt(sec){
      sec = Math.max(0, sec|0);
      const m = Math.floor(sec/60);
      const s = sec%60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    v.addEventListener("timeupdate", () => {
      const dur = v.duration || 0;
      const cur = v.currentTime || 0;

      if (CONFIG.stopAtSeconds > 0 && cur >= CONFIG.stopAtSeconds) {
        v.pause();
        // 止めた瞬間にモーダル出したいなら↓をON
        // openModal("default");
      }

      const pct = dur ? (cur/dur)*100 : 0;
      miniBar.style.width = `${pct}%`;
      miniTime.textContent = fmt(cur);
    });

    // ===== Modal =====
    function openModal(kind="default"){
      const copy = CONFIG.modalCopy;
      modalTitle.textContent = copy.defaultTitle;

      let text = copy.defaultText;
      if (kind === "like") text = copy.likeText;
      if (kind === "save") text = copy.saveText;
      if (kind === "comment") text = copy.commentText;
      if (kind === "sound") text = copy.soundText;

      modalText.innerHTML = text;
      modalInstallBtn.href = CONFIG.ctaUrl;
      modal.classList.add("show");
    }
    function closeModal(){ modal.classList.remove("show"); }

    modalClose.addEventListener("click", (e)=>{ e.stopPropagation(); closeModal(); });
    modal.addEventListener("click", (e)=>{ if(e.target === modal) closeModal(); });

    // ===== Right UI clicks (show modal) =====
    function stop(e){ e.stopPropagation(); }
    btnLike.addEventListener("click", (e)=>{ stop(e); openModal("like"); });
    btnSave.addEventListener("click", (e)=>{ stop(e); openModal("save"); });
    btnComment.addEventListener("click", (e)=>{ stop(e); openModal("comment"); });

    function syncSoundBtn(){
      btnSound.textContent = v.muted ? "🔇" : "🔊";
    }
    syncSoundBtn();

    btnSound.addEventListener("click", (e)=>{
      stop(e);
      // “押したらモーダル”にしたいなら下の2行をコメントして openModal("sound") にしてOK
      v.muted = !v.muted;
      syncSoundBtn();
      v.play().catch(()=>{});
      // openModal("sound");
    });

    btnFs.addEventListener("click", async (e)=>{
      stop(e);
      try{
        if(!document.fullscreenElement){
          await (document.documentElement.requestFullscreen?.() || Promise.resolve());
        }else{
          await (document.exitFullscreen?.() || Promise.resolve());
        }
      }catch(_){}
    });

    async function shareNow(){
      const shareData = { title: document.title, text: "Check this out", url: location.href };
      try{
        if(navigator.share) await navigator.share(shareData);
        else openModal("default");
      }catch(_){}
    }
    btnShare.addEventListener("click", (e)=>{ stop(e); shareNow(); });
    btnShareTop.addEventListener("click", (e)=>{ stop(e); shareNow(); });

    // Back
    btnBack.addEventListener("click", (e)=>{ stop(e); history.back(); });

    // CTA（下の青ボタン）：そのまま遷移
    cta.addEventListener("click", ()=>{ v.pause(); });

    // error
    v.addEventListener("error", () => {
      alert("動画の読み込みに失敗。video.mp4 の場所/形式(H.264)を確認してね。");
    });
  </script>
</body>
</html>
