<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LP</title>

<style>
body {
  margin: 0;
  background: #000;
  overflow: hidden;
}

/* 背景ぼかし動画 */
.bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(30px) brightness(0.4);
}

/* メイン動画 */
.main-video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* 右UI */
.right-ui {
  position: absolute;
  right: 10px;
  top: 30%;
  display: flex;
  flex-direction: column;
  gap: 20px;
  color: white;
  align-items: center;
}

.icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
}

/* CTAボタン */
.cta {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #007bff;
  color: white;
  padding: 16px 28px;
  border-radius: 12px;
  font-weight: bold;
  text-decoration: none;
}

/* プログレスバー */
.progress {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 5px;
  background: rgba(255,255,255,0.2);
}

.bar {
  height: 100%;
  width: 0%;
  background: #ff2d75;
}
</style>
</head>

<body>

<!-- 背景 -->
<video class="bg-video" id="bg" muted autoplay loop playsinline></video>

<!-- メイン -->
<video class="main-video" id="video" muted autoplay playsinline></video>

<!-- 右UI -->
<div class="right-ui">
  <div class="icon">❤</div>
  <div>805</div>

  <div class="icon">💾</div>
  <div>579</div>

  <div class="icon">💬</div>
  <div>180</div>
</div>

<!-- CTA -->
<a class="cta" href="https://ad-nex.com/u/aiacgdx3w5rq">
  続きはアプリで見る
</a>

<!-- プログレス -->
<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<script>
const VIDEO_URL = "./video.mp4"; // ←ここだけ変える

const v = document.getElementById("video");
const bg = document.getElementById("bg");
const bar = document.getElementById("bar");

v.src = VIDEO_URL;
bg.src = VIDEO_URL;

/* プログレス */
v.addEventListener("timeupdate", () => {
  const p = (v.currentTime / v.duration) * 100;
  bar.style.width = p + "%";
});

/* タップで再生/停止 */
document.body.addEventListener("click", () => {
  if (v.paused) {
    v.play();
  } else {
    v.pause();
  }
});
</script>

</body>
</html>
