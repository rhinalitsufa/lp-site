<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>LP Video</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.7);
      --line:rgba(255,255,255,.18);
      --accent:#ff2d75; /* ピンク系 */
      --accent2:#ff4aa0;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      overflow:hidden;
    }

    /* --- Stage --- */
    .stage{
      position:relative;
      width:100%;
      height:100vh;
      height:100dvh;
      background:#000;
    }
    video{
      width:100%;
      height:100%;
      object-fit:contain; /* 背景は黒で、動画を全体に */
      background:#000;
      display:block;
    }

    /* --- Overlays --- */
    .topbar{
      position:absolute;
      top:0;
      left:0;
      right:0;
      padding: calc(10px + var(--safe-top)) 12px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      pointer-events:none;
    }
    .topbar .left, .topbar .right{
      display:flex; gap:10px; align-items:center;
      pointer-events:auto;
    }
    .icon-btn{
      width:36px; height:36px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      display:grid; place-items:center;
      color:#fff;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active{ transform:scale(.98); }

    .right-rail{
      position:absolute;
      right:10px;
      top: 22%;
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
      pointer-events:none;
    }
    .rail-item{
      pointer-events:auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      color:var(--fg);
      font-size:12px;
      opacity:.95;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .rail-item .bubble{
      width:46px; height:46px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      display:grid; place-items:center;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      cursor:pointer;
    }
    .rail-item .count{ color:var(--muted); font-weight:600; }

    /* --- Bottom UI --- */
    .bottombar{
      position:absolute;
      left:0; right:0;
      bottom:0;
      padding: 10px 12px calc(12px + var(--safe-bottom));
      pointer-events:none;
      background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
    }
    .progress-wrap{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .time{
      font-variant-numeric: tabular-nums;
      font-size:12px;
      color:var(--muted);
      min-width:64px;
      text-align:right;
    }
    .progress{
      position:relative;
      height:4px;
      flex:1;
      border-radius:999px;
      background: rgba(255,255,255,.22);
      overflow:hidden;
    }
    .progress > .bar{
      position:absolute;
      left:0; top:0; bottom:0;
      width:0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .progress > .dot{
      position:absolute;
      top:50%;
      width:10px; height:10px;
      border-radius:999px;
      background:#fff;
      transform: translate(-50%,-50%);
      left:0%;
      box-shadow: 0 6px 18px rgba(255,255,255,.18);
      opacity:.95;
    }

    .cta-row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }
    .cta{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:14px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color:#fff;
      text-decoration:none;
      font-weight:800;
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      white-space:nowrap;
    }
    .cta:active{ transform:scale(.99); }
    .cta small{
      display:block;
      font-weight:700;
      opacity:.9;
      font-size:12px;
    }
    .subline{
      pointer-events:auto;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
      max-width:56%;
    }

    /* --- Modal / Gate --- */
    .gate{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      z-index:20;
    }
    .gate.show{ display:flex; }
    .card{
      width:min(520px, 100%);
      background: rgba(18,18,18,.9);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:18px;
      box-shadow: var(--shadow);
    }
    .card h2{
      margin:0 0 8px;
      font-size:18px;
      letter-spacing:.01em;
    }
    .card p{
      margin:0 0 14px;
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }
    .card .btns{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      -webkit-tap-highlight-color: transparent;
    }
    .btn.primary{
      border:none;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .hint{
      position:absolute;
      left:50%;
      top:52%;
      transform: translate(-50%,-50%);
      padding:10px 12px;
      border-radius:999px;
      background: rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.9);
      font-size:13px;
      backdrop-filter: blur(8px);
      opacity:0;
      transition: opacity .25s ease;
      pointer-events:none;
    }
    .hint.show{ opacity:1; }

    /* Make sure clicks work */
    .tap-layer{
      position:absolute;
      inset:0;
      z-index:5;
    }

    /* small screens tweaks */
    @media (max-width: 420px){
      .subline{ max-width:52%; }
      .cta{ padding:12px 16px; }
      .right-rail{ top:20%; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <video id="v" playsinline muted preload="metadata"></video>

    <!-- Tap layer (to play/pause easily) -->
    <div class="tap-layer" id="tapLayer" aria-label="tap to play/pause"></div>

    <!-- Top bar -->
    <div class="topbar">
      <div class="left">
        <div class="icon-btn" id="btnBack" title="Back" aria-label="Back">
          <!-- chevron left -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="right">
        <div class="icon-btn" id="btnShare" title="Share" aria-label="Share">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 6l-4-4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 2v14" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Right rail -->
    <div class="right-rail">
      <div class="rail-item">
        <div class="bubble" id="btnLike" title="Like" aria-label="Like">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 21s-7-4.35-9.5-8.3C.6 9.3 2.1 6.2 5.4 5.3c1.8-.5 3.7.1 4.9 1.5 1.2-1.4 3.1-2 4.9-1.5 3.3.9 4.8 4 2.9 7.4C19 16.65 12 21 12 21z"
              stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="count" id="likeCount">805</div>
      </div>

      <div class="rail-item">
        <div class="bubble" id="btnSave" title="Save" aria-label="Save">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="count" id="saveCount">579</div>
      </div>

      <div class="rail-item">
        <div class="bubble" id="btnComment" title="Comment" aria-label="Comment">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a4 4 0 01-4 4H8l-5 3V7a4 4 0 014-4h10a4 4 0 014 4v8z"
              stroke="white" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="count" id="commentCount">180</div>
      </div>

      <div class="rail-item">
        <div class="bubble" id="btnMute" title="Mute/Unmute" aria-label="Mute">
          <svg id="muteIcon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M11 5L6 9H3v6h3l5 4V5z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M19 9l-4 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M15 9l4 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="count" id="muteLabel">mute</div>
      </div>
    </div>

    <!-- Hint -->
    <div class="hint" id="hint">タップで再生 / 一時停止</div>

    <!-- Bottom bar -->
    <div class="bottombar">
      <div class="progress-wrap">
        <div class="progress" aria-label="progress">
          <div class="bar" id="bar"></div>
          <div class="dot" id="dot"></div>
        </div>
        <div class="time" id="time">0:00 / 0:00</div>
      </div>

      <div class="cta-row">
        <a class="cta" id="cta" href="#" rel="noopener">
          続きを見る
          <small>インストールして視聴</small>
        </a>
        <div class="subline" id="subline">
          ※ 続きはボタンから。<br/>
          タップで再生 / 右のボタンでミュート切替
        </div>
      </div>
    </div>

    <!-- Gate modal -->
    <div class="gate" id="gate" role="dialog" aria-modal="true" aria-label="Continue dialog">
      <div class="card">
        <h2>続きの視聴はこちら</h2>
        <p>
          続きを視聴するには、下のボタンから移動してください。<br>
          （※LPの仕様に合わせて文言は自由に変更OK）
        </p>
        <div class="btns">
          <button class="btn" id="btnClose">閉じる</button>
          <button class="btn primary" id="btnGo">続きへ進む</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * =========================
     *  設定（ここだけ変えればOK）
     * =========================
     */
    const CONFIG = {
　　　const CONFIG = {
  　　videoSrc: "./ビデオソース/ビデオ.mp4",
  　　ctaUrl: "https://あなたのリンク",
  　　stopAtSeconds: 5.0,                    // ★この秒で自動停止（0で無効）
      showGateOnStop: true,                      // 停止時にモーダル出す
      loopBeforeStop: false,                     // stopAtSecondsより前でループしたい場合
      startMuted: true,                          // 初期ミュート
      tapHintMs: 1400,                           // 初回ヒント表示
      fakeCounts: { like: 805, save: 579, comment: 180 } // 表示用（任意）
    };

    const v = document.getElementById("v");
    const bar = document.getElementById("bar");
    const dot = document.getElementById("dot");
    const timeEl = document.getElementById("time");
    const cta = document.getElementById("cta");
    const tapLayer = document.getElementById("tapLayer");
    const hint = document.getElementById("hint");
    const gate = document.getElementById("gate");
    const btnClose = document.getElementById("btnClose");
    const btnGo = document.getElementById("btnGo");

    // right rail buttons
    const btnMute = document.getElementById("btnMute");
    const muteLabel = document.getElementById("muteLabel");
    const likeCount = document.getElementById("likeCount");
    const saveCount = document.getElementById("saveCount");
    const commentCount = document.getElementById("commentCount");

    // top buttons (optional behaviors)
    document.getElementById("btnBack").addEventListener("click", () => history.back());
    document.getElementById("btnShare").addEventListener("click", async () => {
      const shareData = { title: document.title, text: "Check this out", url: location.href };
      try{
        if(navigator.share) await navigator.share(shareData);
        else alert("共有機能が使えない端末です");
      }catch(e){ /* user cancelled */ }
    });

    // counts
    likeCount.textContent = CONFIG.fakeCounts.like;
    saveCount.textContent = CONFIG.fakeCounts.save;
    commentCount.textContent = CONFIG.fakeCounts.comment;

    // init video
    v.src = CONFIG.videoSrc;
    v.muted = !!CONFIG.startMuted;
    v.playsInline = true;
    v.preload = "metadata";

    cta.href = CONFIG.ctaUrl;

    function fmtTime(sec){
      if(!isFinite(sec) || sec < 0) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function setProgress(){
      const dur = v.duration || 0;
      const cur = v.currentTime || 0;
      const pct = dur ? (cur / dur) * 100 : 0;
      bar.style.width = `${pct}%`;
      dot.style.left = `${pct}%`;
      timeEl.textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
    }

    // Hint once
    setTimeout(() => hint.classList.add("show"), 200);
    setTimeout(() => hint.classList.remove("show"), CONFIG.tapHintMs);

    // Tap-to-play/pause
    tapLayer.addEventListener("click", async () => {
      if(v.paused){
        try{ await v.play(); }catch(e){ /* autoplay blocked */ }
      } else {
        v.pause();
      }
    });

    // Mute toggle
    function syncMuteUI(){
      muteLabel.textContent = v.muted ? "mute" : "sound";
      // icon swap (simple)
      const icon = document.getElementById("muteIcon");
      icon.innerHTML = v.muted
        ? `<path d="M11 5L6 9H3v6h3l5 4V5z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
           <path d="M19 9l-4 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
           <path d="M15 9l4 6" stroke="white" stroke-width="2" stroke-linecap="round"/>`
        : `<path d="M11 5L6 9H3v6h3l5 4V5z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
           <path d="M16 8a5 5 0 010 8" stroke="white" stroke-width="2" stroke-linecap="round"/>
           <path d="M18.5 5.5a9 9 0 010 13" stroke="white" stroke-width="2" stroke-linecap="round"/>`;
    }
    btnMute.addEventListener("click", () => {
      v.muted = !v.muted;
      syncMuteUI();
      if(!v.paused) return;
      // unmute時に再生促進
      v.play().catch(()=>{});
    });
    syncMuteUI();

    // Gate controls
    function openGate(){
      gate.classList.add("show");
    }
    function closeGate(){
      gate.classList.remove("show");
    }
    btnClose.addEventListener("click", closeGate);
    btnGo.addEventListener("click", () => location.href = CONFIG.ctaUrl);

    // progress updates
    v.addEventListener("timeupdate", () => {
      setProgress();

      if(CONFIG.stopAtSeconds > 0 && v.currentTime >= CONFIG.stopAtSeconds){
        v.pause();

        if(CONFIG.loopBeforeStop){
          v.currentTime = 0;
          v.play().catch(()=>{});
          return;
        }

        if(CONFIG.showGateOnStop){
          openGate();
        }
      }
    });

    v.addEventListener("loadedmetadata", setProgress);
    v.addEventListener("ended", setProgress);

    // CTA click: stop video then go
    cta.addEventListener("click", (e) => {
      // LPの意図で「遷移前にゲート表示」も可能
      // 今回はそのまま遷移
      v.pause();
    });

    // prevent background scroll on iOS overscroll
    document.addEventListener("touchmove", (e) => {
      // allow inside gate card if needed (not scrolling anyway)
      if(gate.classList.contains("show")) return;
      e.preventDefault();
    }, { passive:false });
  </script>
</body>
</html>
