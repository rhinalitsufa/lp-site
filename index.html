<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Player</title>
  <style>
    :root{
      --bg:#2b2b2b;
      --panel:#1e1e1e;
      --muted:rgba(255,255,255,.75);
      --cta:#1e90ff;
      --ctaText:#fff;
      --shadow:0 18px 60px rgba(0,0,0,.55);
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:#fff;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      overflow:hidden;
    }

    /* 背景 */
    .stage{
      position:fixed; inset:0;
      display:grid;
      place-items:center;
      background: radial-gradient(1200px 600px at 50% 40%, rgba(255,255,255,.05), transparent 55%),
                  linear-gradient(#3a3a3a, #2a2a2a);
    }

    /* 右上：ダウンロード風 */
    .dl{
      position:fixed; top:18px; right:18px;
      width:56px; height:56px;
      border-radius:12px;
      background:#2f7cff;
      display:grid; place-items:center;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      user-select:none;
      cursor:pointer;
    }
    .dl svg{width:26px;height:26px;fill:#fff}

    /* 左下：X */
    .leftBrand{
      position:fixed; left:20px; bottom:42px;
      width:44px; height:44px;
      border-radius:10px;
      background:#111;
      display:grid; place-items:center;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      opacity:.95;
    }
    .leftBrand span{font-weight:800; font-size:18px}

    /* 右側：SNSアイコン（ダミー） */
    .rightStack{
      position:fixed; right:18px; bottom:80px;
      display:flex; flex-direction:column; gap:14px;
    }
    .pill{
      width:58px; height:58px;
      border-radius:16px;
      background:#141414;
      display:grid; place-items:center;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      cursor:pointer;
      user-select:none;
      opacity:.95;
    }
    .pill span{font-weight:800}

    /* 中央：プレビューカード */
    .previewWrap{
      width:min(420px, 92vw);
      display:grid;
      place-items:center;
      gap:18px;
      transform: translateY(-10px);
    }
    .previewCard{
      width:240px;
      aspect-ratio: 9/16;
      border-radius:14px;
      background:#000;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    video{
      width:100%; height:100%;
      object-fit:cover;
      display:block;
      background:#000;
    }

    /* 上の× */
    .close{
      position:absolute;
      top:8px; right:8px;
      width:28px; height:28px;
      border-radius:999px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      display:grid; place-items:center;
      font-size:16px;
      cursor:pointer;
      user-select:none;
      z-index:4;
    }

    /* ローディング */
    .loading{
      position:absolute; inset:0;
      display:grid; place-items:center;
      background:rgba(0,0,0,.15);
      z-index:3;
      pointer-events:none;
    }
    .spinner{
      width:54px; height:54px;
      border-radius:999px;
      border:5px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      animation: spin 0.9s linear infinite;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,.45));
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* 下の大きいCTA */
    .ctaBar{
      position:fixed;
      left:0; right:0; bottom:28px;
      display:grid;
      place-items:center;
      padding:0 18px;
    }
    .ctaBtn{
      width:min(560px, 92vw);
      height:56px;
      border-radius:14px;
      border:none;
      background:var(--cta);
      color:var(--ctaText);
      font-weight:900;
      font-size:16px;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
      cursor:pointer;
    }
    .ctaSub{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.65);
      text-align:center;
    }

    /* “途中まで→続き”のゲート（あなたの今の機能） */
    .gate{
      position:fixed; inset:0;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.55);
      backdrop-filter: blur(3px);
      z-index:10;
      padding:22px;
    }
    .gateCard{
      width:min(360px, 92vw);
      background:rgba(20,20,20,.82);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:18px 16px;
      box-shadow:var(--shadow);
      text-align:center;
    }
    .gateCard h2{margin:0 0 8px;font-size:16px}
    .gateCard p{margin:0 0 14px;color:rgba(255,255,255,.75);font-size:13px;line-height:1.5}
    .gateLink{
      display:inline-block;
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      background:var(--cta);
      color:#fff;
      font-weight:900;
      text-decoration:none;
    }
    .gateNote{margin-top:10px;font-size:11px;color:rgba(255,255,255,.6)}
  </style>
</head>
<body>

  <div class="stage">
    <!-- 中央プレビュー -->
    <div class="previewWrap">

      <div class="previewCard">
        <div class="close" title="close">×</div>

        <video id="v" playsinline muted preload="metadata">
          <!-- ✅動画（Pages版URL） -->
          <source src="https://rhinalitsufa.github.io/lp-site/ssstik.io_1683269598753%20%28video-converter.com%29.mp4" type="video/mp4">
        </video>

        <div class="loading" id="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右上：DL風（押しても何もしないダミー。必要ならリンク化） -->
  <div class="dl" title="download">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3a1 1 0 0 1 1 1v9.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1zM5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1z"/>
    </svg>
  </div>

  <!-- 左下：X -->
  <div class="leftBrand" title="X"><span>X</span></div>

  <!-- 右側：SNS（ダミー） -->
  <div class="rightStack">
    <div class="pill" title="Instagram"><span>IG</span></div>
    <div class="pill" title="TikTok"><span>TT</span></div>
  </div>

  <!-- 下のCTA -->
  <div class="ctaBar">
    <button class="ctaBtn" id="ctaBtn">残り7分👉 アプリで見る</button>
    <div class="ctaSub">※リンク先で内容をご確認ください</div>
  </div>

  <!-- 途中停止→ゲート -->
  <div class="gate" id="gate">
    <div class="gateCard">
      <h2>続きはこちら</h2>
      <p>続き・関連コンテンツは下のボタンから。</p>

      <!-- ✅広告リンク：ここに入れる -->
      <a class="gateLink"
         href="https://ad-nex.com/u/aiacgdx3w5rq"
         target="_blank"
         rel="noopener noreferrer"
         referrerpolicy="no-referrer">
        続きを見る
      </a>

      <div class="gateNote">※リンク先で内容をご確認ください</div>
    </div>
  </div>

<script>
  const v = document.getElementById('v');
  const loading = document.getElementById('loading');
  const gate = document.getElementById('gate');
  const ctaBtn = document.getElementById('ctaBtn');

  // ✅ 何秒で止めるか（好みで調整）
  const STOP_AT = 8;

  // ローディング消す
  v.addEventListener('loadeddata', () => loading.style.display = 'none');
  v.addEventListener('canplay', () => loading.style.display = 'none');

  // “あのLP風”に：最初は勝手に再生を試みる（失敗してもOK）
  v.play().catch(()=>{});

  // 途中停止でゲート
  v.addEventListener('timeupdate', () => {
    if (v.currentTime >= STOP_AT) {
      v.pause();
      gate.style.display = 'grid';
    }
  });

  // 下の青ボタン：広告へ
  ctaBtn.addEventListener('click', () => {
    // 404対策（リファラ切り）
    window.open('https://ad-nex.com/u/aiacgdx3w5rq', '_blank', 'noopener,noreferrer');
  });
</script>
</body>
</html>
