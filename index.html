<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動画LP</title>

<style>
body {
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:sans-serif;
}

.player {
  width:90%;
  max-width:400px;
  position:relative;
}

video {
  width:100%;
  border-radius:10px;
}

.overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.playBtn {
  width:70px;
  height:70px;
  background:rgba(0,0,0,0.6);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.playBtn:after {
  content:'▶';
  font-size:30px;
}

#cta {
  display:none;
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:15px 20px;
  font-size:18px;
  background:#1e90ff;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="player">

<video id="video" playsinline>
  <source src="https://raw.githubusercontent.com/rhinalitsufa/lp-site/main/_talkv_wqGH5O6HXg_0m4K5RH5y8sE9ktNBkiHK_talkv_high.mov" type="video/mp4">
</video>

<div class="overlay" id="overlay">
  <div class="playBtn" onclick="startVideo()"></div>
</div>

<button id="cta" onclick="location.href='https://lit.link/'">
  続きはこちら
</button>

</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const cta = document.getElementById("cta");

// 再生開始
function startVideo(){
  video.play();
  overlay.style.display = "none";
}

// 8秒で止める
video.addEventListener("timeupdate", function() {
  if (video.currentTime >= 8) {
    video.pause();
    cta.style.display = "block";
  }
});
</script>

</body>
</html>
