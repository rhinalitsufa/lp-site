<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>X player</title>

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.75);
      --line:rgba(255,255,255,.18);
      --pink:#ff2d75;
      --pink2:#ff4aa0;
      --shadow:0 18px 50px rgba(0,0,0,.45);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans JP", sans-serif;
      overflow:hidden;
    }

    /* ===== Video ===== */
    .stage{ position:fixed; inset:0; background:#000; z-index:0; }
    video{ width:100%; height:100%; object-fit:contain; background:#000; display:block; }

    /* ===== Tap layer ===== */
    .tapLayer{ position:fixed; inset:0; z-index:5; pointer-events:auto; }

    /* ===== Autoplay blocked overlay ===== */
    .playOverlay{
      position:fixed; inset:0; z-index:60;
      display:none; place-items:center;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(2px);
      -webkit-tap-highlight-color: transparent;
      user-select:none; cursor:pointer;
    }
    .playOverlay.show{ display:grid; }
    .playOverlay .btn{
      display:flex; align-items:center; gap:10px;
      padding:14px 16px; border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.55);
      box-shadow: 0 18px 40px rgba(0,0,0,.65);
      font-weight:900; color:#fff;
    }
    .playOverlay .icon{
      width:46px;height:46px;border-radius:999px;
      display:grid;place-items:center;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
      font-size:20px;
    }
    .playOverlay .sub{
      margin-top:10px; font-size:12px;
      color:rgba(255,255,255,.75);
      text-shadow: 0 8px 18px rgba(0,0,0,.65);
      text-align:center; padding:0 18px;
    }

    /* ===== Top Info ===== */
    .topInfo{
      position:fixed; left:14px; top: calc(14px + var(--safe-top));
      z-index:40; display:flex; flex-direction:column; gap:10px;
      text-shadow: 0 8px 18px rgba(0,0,0,.55);
      pointer-events:auto;
    }
    .saveRow{
      display:flex; align-items:center; gap:8px;
      font-size:12px; color:rgba(255,255,255,.92);
      user-select:none;
    }
    .pillBtn{
      display:inline-flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 14px; border-radius:999px;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      font-weight:900; font-size:13px;
      -webkit-tap-highlight-color: transparent;
      user-select:none; text-decoration:none; color:#fff;
      width:min(320px, 78vw);
    }
    .pillBtn .arrow{ opacity:.9; font-size:16px; }

    .limitedText{
      font-size:12px; color:rgba(255,255,255,.92);
      line-height:1.35; max-width:min(360px, 86vw);
      pointer-events:none;
    }
    .limitedText b{
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      padding:2px 6px; border-radius:8px; margin-right:6px;
    }

    /* A: countdown pill */
    .countDownRow{
      display:flex; align-items:center; gap:8px;
      font-size:12px; color:rgba(255,255,255,.92);
      user-select:none;
    }
    .countPill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
    }
    .countPill .dot{
      width:8px;height:8px;border-radius:999px;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
      box-shadow: 0 8px 18px rgba(255,45,117,.25);
    }
    .countPill .time{ font-weight:900; letter-spacing:.3px; }

    /* ===== Right Rail ===== */
    .rightRail{
      position:fixed; right:14px; top: 10%;
      z-index:50; display:flex; flex-direction:column; gap:14px; align-items:center;
      pointer-events:auto;
    }
    .railBtn{
      width:48px;height:48px; border-radius:999px;
      background: rgba(0,0,0,.38);
      border:1px solid rgba(255,255,255,.14);
      display:grid;place-items:center;
      box-shadow: var(--shadow);
      cursor:pointer; user-select:none;
      -webkit-tap-highlight-color: transparent;
      color:#fff; pointer-events:auto;
      transition: transform .12s ease;
    }
    .railBtn:active{ transform:scale(.98); }

    .profileWrap{ display:flex; flex-direction:column; align-items:center; gap:6px; }
    .avatarBtn{
      width:54px;height:54px; border-radius:999px; overflow:hidden;
      border:2px solid rgba(255,255,255,.22);
      box-shadow: var(--shadow);
      background:#111; cursor:pointer; position:relative;
      -webkit-tap-highlight-color: transparent;
      pointer-events:auto;
    }
    .avatarBtn img{ width:100%;height:100%; object-fit:cover; display:block; }
    .plusBadge{
      position:absolute; left:50%; bottom:-7px; transform: translateX(-50%);
      width:22px;height:22px; border-radius:999px; display:grid;place-items:center;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
      border:2px solid rgba(0,0,0,.5);
      font-weight:900; font-size:14px;
    }

    .actionItem{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      font-size:12px; color:rgba(255,255,255,.85);
      text-shadow: 0 8px 18px rgba(0,0,0,.55);
      pointer-events:auto;
    }
    .count{
      font-weight:900; color:rgba(255,255,255,.80);
      user-select:none;
      transition: transform .12s ease;
    }

    /* micro animations */
    .pop{ animation: pop .22s ease; }
    @keyframes pop{ 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
    .pulse{ animation: pulse .25s ease; }
    @keyframes pulse{ 0%{transform:scale(1)} 50%{transform:scale(.92)} 100%{transform:scale(1)} }

    /* ===== Bottom progress + nav ===== */
    .bottomArea{
      position:fixed; left:0; right:0; bottom:0;
      z-index:45;
      background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
      padding: 10px 12px calc(10px + var(--safe-bottom));
      pointer-events:auto;
    }
    .progressRow{
      display:flex; align-items:center; gap:10px;
      margin-bottom:10px; opacity:.95;
      user-select:none;
    }
    .playIcon{
      width:22px;height:22px; display:grid;place-items:center;
      opacity:.95; cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      pointer-events:auto;
    }
    .progress{
      flex:1; height:4px; border-radius:999px;
      background: rgba(255,255,255,.20);
      overflow:hidden; position:relative; cursor:pointer;
      pointer-events:auto;
    }
    .progress > .bar{
      position:absolute; inset:0 auto 0 0; width:0%;
      background: linear-gradient(90deg, var(--pink), var(--pink2));
    }
    .progress > .dot{
      position:absolute; top:50%;
      width:10px;height:10px; border-radius:999px; background:#fff;
      transform: translate(-50%,-50%); left:0%;
      box-shadow: 0 8px 18px rgba(255,255,255,.18);
    }
    .time{
      min-width:88px; text-align:right; font-size:12px;
      color:rgba(255,255,255,.78); font-variant-numeric: tabular-nums;
      pointer-events:none;
    }
    .navBar{
      display:flex; justify-content:space-around; align-items:flex-end;
      padding-top:6px; border-top:1px solid rgba(255,255,255,.10);
      user-select:none; pointer-events:auto;
    }
    .navItem{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color:rgba(255,255,255,.80); font-size:11px; width:20%;
      -webkit-tap-highlight-color: transparent;
      cursor:pointer; pointer-events:auto;
    }
    .navItem svg{ opacity:.9; }

    /* ===== Modal ===== */
    .modal{
      position:fixed; inset:0; display:none;
      align-items:center; justify-content:center;
      padding:16px; background: rgba(0,0,0,.55);
      z-index:9999; pointer-events:auto;
    }
    .modal.show{ display:flex; }
    .modalCard{
      width:min(520px, 92vw);
      background:#fff; color:#111;
      border-radius:18px;
      padding:18px 18px 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      position:relative;
      text-align:center;
    }
    .modalClose{
      position:absolute; right:12px; top:10px;
      border:none; background:transparent;
      font-size:22px; cursor:pointer; color:#666;
    }
    .modalTitle{ margin:6px 0 8px; font-size:18px; font-weight:900; }
    .modalText{ margin:0 0 14px; color:#555; font-size:13px; line-height:1.6; }
    .modalBtn{
      display:inline-block;
      background: var(--pink); color:#fff;
      text-decoration:none; font-weight:900;
      padding:12px 18px; border-radius:999px;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .modalBtn:active{ transform:scale(.99); }

    /* ===== Floating X ===== */
    #floatingX{
      position: fixed;
      right: 18px;
      bottom: calc(90px + var(--safe-bottom));
      width: 60px; height: 60px; border-radius: 999px; overflow: hidden;
      z-index: 99999 !important;
      pointer-events: auto !important;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(0,0,0,.65);
      background:#000;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      transition: transform .12s ease;
    }
    #floatingX:active{ transform:scale(.98); }
    #floatingX img{ width:100%; height:100%; object-fit:cover; display:block; }
    #floatingX .xMeta{
      position:absolute; left:50%; bottom:-24px; transform:translateX(-50%);
      display:flex; gap:8px; font-size:12px; font-weight:900;
      color:#1da1f2;
      text-shadow:0 6px 16px rgba(0,0,0,.75);
      pointer-events:none; white-space:nowrap;
    }
    #floatingX .xMeta span{
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      padding:2px 6px;
      border-radius:999px;
    }

    /* =========================
       コメント吹き出し（②）
       ========================= */
    .commentLayer{
      position:fixed;
      left:12px;
      right:92px; /* 右レールとかぶらない */
      bottom: calc(132px + var(--safe-bottom));
      z-index:70;
      pointer-events:none;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .cmt{
      width: fit-content;
      max-width: min(86vw, 520px);
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      padding:10px 12px;
      box-shadow: 0 18px 40px rgba(0,0,0,.55);
      backdrop-filter: blur(2px);
      transform: translateY(14px);
      opacity: 0;
      animation: cmtIn .28s ease forwards;
    }
    @keyframes cmtIn{
      from{ transform: translateY(14px); opacity:0; }
      to{ transform: translateY(0px); opacity:1; }
    }
    .cmtOut{
      animation: cmtOut .35s ease forwards;
    }
    @keyframes cmtOut{
      from{ transform: translateY(0px); opacity:1; }
      to{ transform: translateY(-10px); opacity:0; }
    }
    .cmtTop{
      display:flex; align-items:center; gap:8px;
      margin-bottom:6px;
    }
    .cmtAvatar{
      width:22px;height:22px;border-radius:999px;
      background: linear-gradient(90deg, rgba(255,45,117,.8), rgba(255,74,160,.8));
      display:grid; place-items:center;
      font-weight:900; font-size:12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.45);
      flex: 0 0 auto;
    }
    .cmtName{
      font-size:12px;
      font-weight:900;
      color: rgba(255,255,255,.92);
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 52vw;
    }
    .cmtTime{
      margin-left:auto;
      font-size:11px;
      color: rgba(255,255,255,.65);
      font-variant-numeric: tabular-nums;
    }
    .cmtBody{
      font-size:13px;
      line-height:1.45;
      color: rgba(255,255,255,.92);
      word-break: break-word;
    }
    .cmtBody b{
      color:#fff;
      background: rgba(255,45,117,.18);
      border: 1px solid rgba(255,45,117,.22);
      padding: 1px 6px;
      border-radius: 999px;
      margin: 0 2px;
    }
  </style>
</head>

<body>
  <div class="stage">
    <video id="v" playsinline muted preload="metadata">
      <source id="vsrc" src="./video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="tapLayer" id="tapLayer" aria-label="tap"></div>

  <div class="playOverlay" id="playOverlay" aria-label="play overlay">
    <div>
      <div class="btn">
        <div class="icon">▶</div>
        <div>タップして再生</div>
      </div>
      <div class="sub">自動再生がブロックされています（iPhone/一部ブラウザ）</div>
    </div>
  </div>

  <!-- 上 -->
  <div class="topInfo">
    <div class="saveRow">
      <span>★</span><span>保存する</span><span style="opacity:.75;">›</span>
    </div>

    <a class="pillBtn" id="topCta" href="#" rel="noopener">
      インストールして視聴する
      <span class="arrow">›</span>
    </a>

    <div class="limitedText" id="limitedText"></div>

    <div class="countDownRow">
      <div class="countPill" id="countPill">
        <span class="dot"></span>
        <span>残り</span>
        <span class="time" id="countDown">--:--:--</span>
      </div>
      <span style="opacity:.8;">で終了</span>
    </div>
  </div>

  <!-- 右 -->
  <div class="rightRail">
    <div class="railBtn" id="btnShare" title="share" aria-label="share">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 6l-4-4-4 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 2v14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="profileWrap">
      <div class="avatarBtn" id="btnProfile" title="profile">
        <img id="avatarImg" alt="avatar">
        <div class="plusBadge">+</div>
      </div>
    </div>

    <div class="actionItem">
      <div class="railBtn" id="btnLike" aria-label="like">♡</div>
      <div class="count" id="likeCount">0</div>
    </div>

    <div class="actionItem">
      <div class="railBtn" id="btnSave" aria-label="save">🔖</div>
      <div class="count" id="saveCount">0</div>
    </div>

    <div class="actionItem">
      <div class="railBtn" id="btnComment" aria-label="comment">💬</div>
      <div class="count" id="commentCount">0</div>
    </div>

    <div class="actionItem">
      <div class="railBtn" id="btnSound" aria-label="sound">🔇</div>
      <div class="count" id="soundLabel">mute</div>
    </div>

    <div class="railBtn" id="btnFull" title="fullscreen" aria-label="fullscreen">⛶</div>
  </div>

  <!-- コメント吹き出しレイヤー（②） -->
  <div class="commentLayer" id="commentLayer" aria-label="comments"></div>

  <!-- 下 -->
  <div class="bottomArea">
    <div class="progressRow">
      <div class="playIcon" id="btnPlay">▶</div>
      <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
        <div class="dot" id="dot"></div>
      </div>
      <div class="time" id="time">0:00 / 0:00</div>
    </div>

    <div class="navBar">
      <div class="navItem" id="navHome">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1h-5v-7H9v7H4a1 1 0 01-1-1v-10.5z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div>ホーム</div>
      </div>
      <div class="navItem" id="navBoost">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2l3 7h7l-5.5 4 2 7-6.5-4.5L5.5 20l2-7L2 9h7l3-7z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div>ブースト</div>
      </div>
      <div class="navItem" id="navRank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M6 20V10M12 20V4M18 20v-8" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>ランキング</div>
      </div>
      <div class="navItem" id="navMsg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a4 4 0 01-4 4H8l-5 3V7a4 4 0 014-4h10a4 4 0 014 4v8z"
            stroke="white" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <div>メッセージ</div>
      </div>
      <div class="navItem" id="navAccount">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M20 21a8 8 0 10-16 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>アカウント</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modalCard">
      <button class="modalClose" id="modalClose" aria-label="close">×</button>
      <h3 class="modalTitle" id="modalTitle">ようこそゲストさん。</h3>
      <p class="modalText" id="modalText"></p>
      <a class="modalBtn" id="modalBtn" href="#" rel="noopener">ストアでインストールする</a>
    </div>
  </div>

  <!-- Floating X -->
  <div id="floatingX" title="X" aria-label="X">
    <img
      src="./x-logo-studio-letter-x-design-icon-logotype-technology-font-vector.jpg"
      alt="X"
      onerror="this.style.display='none'; this.parentElement.style.display='grid'; this.parentElement.style.placeItems='center'; this.parentElement.style.fontWeight='900'; this.parentElement.textContent='X';"
    >
    <div class="xMeta">
      <span id="xFollowers">17K</span>
      <span id="xViews">4M</span>
    </div>
  </div>

  <script>
    const CONFIG = {
      pageTitle: "X player",
      videoSrc: "./yiBqOk411.mp4",
      ctaUrl: "https://ad-nex.com/u/aiacgdx3w5rq",
      twitterUrl: "https://x.com/tyui33601530",
      avatarUrl: "./3dc20f42-4632-4455-bd81-33a5c32e1bce.jpg",

      counts: { like: 805, save: 579, comment: 180 },

      countdownSeconds: 24 * 60 * 60,
      limitedTextHtml: "<b>24時間限定</b><b>3日間だけ無料プレゼント</b> 🎁 この映像を見つけた",

      xFollowerCount: 17000,
      xViewCount: 4000000,

      popupOnEnded: true,
      popupDelayMs: 250,
      showPopupOnLoad: true,
      popupOnLoadDelayMs: 400,
      stopAtSeconds: 0,

      bump: {
        likeMin: 1, likeMax: 6,
        saveMin: 0, saveMax: 2,
        commentMin: 0, commentMax: 2,
        autoEveryMs: 3800,
        autoChance: 0.55
      },

      /* ② コメント吹き出し設定 */
      comments: {
        enabled: true,
        minIntervalMs: 2200,
        maxIntervalMs: 5200,
        maxOnScreen: 2,
        lifeMs: 3200,
        // 「ごくひちゃん」系の表示名（ここ自由に増やせる）
        names: [
          "ごくひちゃん推し",
          "ごくひ民",
          "ごくひちゃん界隈",
          "ごくひちゃんファン",
          "ごくひちゃん応援隊",
          "ごくひちゃん🩷",
          "ごくひちゃんしか勝たん",
          "ごくひちゃんガチ勢",
          "ごくひちゃん神",
          "ごくひちゃん好き",
          "ごくひちゃん見守り隊",
          "ごくひちゃんの人"
        ],
        // コメント文（ここも自由に差し替えOK）
        messages: [
          "ごくひちゃん、今日もかわいすぎる…",
          "これ最後まで見たら<b>続き</b>ある？",
          "ごくひちゃんの<b>踊り</b>めっちゃ好き",
          "今の一瞬で心持ってかれた",
          "ごくひちゃんの<b>雰囲気</b>強い…",
          "ここの動きやばい、保存した",
          "まって無限に見れる",
          "ごくひちゃんってこういうのもいけるの！？",
          "ここからが本番ってこと？",
          "ごくひちゃんの<b>破壊力</b>えぐい",
          "あと何本あるの？",
          "ごくひちゃんの続き、どこで見れる？"
        ]
      },

      modalCopy: {
        defaultTitle: "ようこそゲストさん。",
        defaultText: "アプリがインストールされていません。<br>インストールをしてからお楽しみください。",
        likeText: "いいねするには、アプリのインストールが必要です。",
        saveText: "保存するには、アプリのインストールが必要です。",
        commentText: "コメントするには、アプリのインストールが必要です。",
        navText: "この機能はアプリで利用できます。インストールして続けてください。"
      }
    };

    const $ = (id) => document.getElementById(id);

    function formatCount(n){
      const num = Number(n);
      if (!isFinite(num)) return String(n ?? "");
      const abs = Math.abs(num);
      if (abs >= 1_000_000_000) return (num/1_000_000_000).toFixed(num%1_000_000_000===0?0:1) + "B";
      if (abs >= 1_000_000) return (num/1_000_000).toFixed(num%1_000_000===0?0:1) + "M";
      if (abs >= 1_000) return (num/1_000).toFixed(num%1_000===0?0:1) + "K";
      return String(num);
    }
    function randInt(min, max){
      const a = Number(min), b = Number(max);
      const lo = Math.min(a,b), hi = Math.max(a,b);
      return Math.floor(lo + Math.random()*(hi-lo+1));
    }
    function addPop(el){ el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop"); }
    function addPulse(el){ el.classList.remove("pulse"); void el.offsetWidth; el.classList.add("pulse"); }

    // elements
    const v = $("v");
    const vsrc = $("vsrc");
    const tapLayer = $("tapLayer");
    const playOverlay = $("playOverlay");

    const bar = $("bar");
    const dot = $("dot");
    const timeEl = $("time");
    const progress = $("progress");
    const btnPlay = $("btnPlay");

    const btnShare = $("btnShare");
    const btnProfile = $("btnProfile");
    const avatarImg = $("avatarImg");
    const floatingX = $("floatingX");

    const btnLike = $("btnLike");
    const btnSave = $("btnSave");
    const btnComment = $("btnComment");
    const btnSound = $("btnSound");
    const soundLabel = $("soundLabel");
    const btnFull = $("btnFull");

    const likeCountEl = $("likeCount");
    const saveCountEl = $("saveCount");
    const commentCountEl = $("commentCount");

    const topCta = $("topCta");
    const limitedText = $("limitedText");

    const navHome = $("navHome");
    const navBoost = $("navBoost");
    const navRank = $("navRank");
    const navMsg = $("navMsg");
    const navAccount = $("navAccount");

    const modal = $("modal");
    const modalClose = $("modalClose");
    const modalTitle = $("modalTitle");
    const modalText = $("modalText");
    const modalBtn = $("modalBtn");

    const countDownEl = $("countDown");
    const countPill = $("countPill");

    const xFollowers = $("xFollowers");
    const xViews = $("xViews");

    const commentLayer = $("commentLayer");

    // init
    document.title = CONFIG.pageTitle || document.title;
    limitedText.innerHTML = CONFIG.limitedTextHtml;
    topCta.href = CONFIG.ctaUrl;
    modalBtn.href = CONFIG.ctaUrl;

    if (CONFIG.avatarUrl && CONFIG.avatarUrl.trim()) avatarImg.src = CONFIG.avatarUrl.trim();

    let likeCount = Number(CONFIG.counts.like) || 0;
    let saveCount = Number(CONFIG.counts.save) || 0;
    let commentCount = Number(CONFIG.counts.comment) || 0;

    likeCountEl.textContent = likeCount;
    saveCountEl.textContent = saveCount;
    commentCountEl.textContent = commentCount;

    xFollowers.textContent = formatCount(CONFIG.xFollowerCount);
    xViews.textContent = formatCount(CONFIG.xViewCount);

    // modal
    function openModal(kind="default"){
      const c = CONFIG.modalCopy;
      modalTitle.textContent = c.defaultTitle;

      let text = c.defaultText;
      if (kind === "like") text = c.likeText;
      if (kind === "save") text = c.saveText;
      if (kind === "comment") text = c.commentText;
      if (kind === "nav") text = c.navText;

      modalText.innerHTML = text;
      modalBtn.href = CONFIG.ctaUrl;
      modal.classList.add("show");
    }
    function closeModal(){ modal.classList.remove("show"); }
    modalClose.addEventListener("click", (e)=>{ e.stopPropagation(); closeModal(); });
    modal.addEventListener("click", (e)=>{ if(e.target === modal) closeModal(); });

    if (CONFIG.showPopupOnLoad){
      window.addEventListener("load", () => {
        setTimeout(() => openModal("default"), CONFIG.popupOnLoadDelayMs || 0);
      });
    }

    // video
    vsrc.src = CONFIG.videoSrc;
    v.load();
    v.muted = true;
    v.playsInline = true;
    v.preload = "metadata";

    function fmtTime(sec){
      if(!isFinite(sec) || sec < 0) return "0:00";
      const m = Math.floor(sec/60);
      const s = Math.floor(sec%60);
      return `${m}:${String(s).padStart(2,"0")}`;
    }
    function setProgress(){
      const dur = v.duration || 0;
      const cur = v.currentTime || 0;
      const pct = dur ? (cur/dur)*100 : 0;
      bar.style.width = `${pct}%`;
      dot.style.left = `${pct}%`;
      timeEl.textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
      btnPlay.textContent = v.paused ? "▶" : "Ⅱ";
    }
    async function tryPlay(){
      try{
        await v.play();
        playOverlay.classList.remove("show");
        return true;
      }catch(_){
        playOverlay.classList.add("show");
        return false;
      }
    }
    const firstGesture = async () => {
      document.removeEventListener("pointerdown", firstGesture, {capture:true});
      document.removeEventListener("touchstart", firstGesture, {capture:true});
      await tryPlay();
    };
    document.addEventListener("pointerdown", firstGesture, {capture:true, passive:true});
    document.addEventListener("touchstart", firstGesture, {capture:true, passive:true});
    playOverlay.addEventListener("click", (e)=>{ e.stopPropagation(); tryPlay(); });

    v.addEventListener("loadedmetadata", () => { setProgress(); tryPlay(); });
    v.addEventListener("timeupdate", () => {
      setProgress();
      if (CONFIG.stopAtSeconds > 0 && v.currentTime >= CONFIG.stopAtSeconds) v.pause();
    });
    v.addEventListener("ended", () => {
      setProgress();
      if (CONFIG.popupOnEnded) setTimeout(() => openModal("default"), CONFIG.popupDelayMs);
    });

    tapLayer.addEventListener("click", async () => {
      if (v.paused) await tryPlay(); else v.pause();
      setProgress();
    });
    btnPlay.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (v.paused) await tryPlay(); else v.pause();
      setProgress();
    });
    progress.addEventListener("click", (e) => {
      e.stopPropagation();
      const rect = progress.getBoundingClientRect();
      const x = Math.min(Math.max(0, e.clientX - rect.left), rect.width);
      const pct = rect.width ? x / rect.width : 0;
      const dur = v.duration || 0;
      if (dur) v.currentTime = dur * pct;
    });

    v.addEventListener("error", () => {
      alert("動画の読み込みに失敗しました。ファイル名/配置(同フォルダ)/形式(H.264)を確認してね。");
    });

    // countdown
    let remaining = Number(CONFIG.countdownSeconds) || 0;
    function fmtHMS(s){
      s = Math.max(0, Math.floor(s));
      const h = Math.floor(s/3600);
      const m = Math.floor((s%3600)/60);
      const ss = s%60;
      return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
    }
    function tickCountdown(){
      countDownEl.textContent = fmtHMS(remaining);
      if (remaining <= 600) addPop(countPill);
      remaining = Math.max(0, remaining - 1);
    }
    tickCountdown();
    setInterval(tickCountdown, 1000);

    // bump counts
    function bump(kind){
      if (kind === "like"){
        likeCount += randInt(CONFIG.bump.likeMin, CONFIG.bump.likeMax);
        likeCountEl.textContent = likeCount;
        addPop(likeCountEl); addPulse(btnLike);
      }
      if (kind === "save"){
        saveCount += randInt(CONFIG.bump.saveMin, CONFIG.bump.saveMax);
        saveCountEl.textContent = saveCount;
        addPop(saveCountEl); addPulse(btnSave);
      }
      if (kind === "comment"){
        commentCount += randInt(CONFIG.bump.commentMin, CONFIG.bump.commentMax);
        commentCountEl.textContent = commentCount;
        addPop(commentCountEl); addPulse(btnComment);
      }
    }
    btnLike.addEventListener("click", (e)=>{ e.stopPropagation(); bump("like"); setTimeout(()=>openModal("like"), 180); });
    btnSave.addEventListener("click", (e)=>{ e.stopPropagation(); bump("save"); setTimeout(()=>openModal("save"), 180); });
    btnComment.addEventListener("click", (e)=>{ e.stopPropagation(); bump("comment"); setTimeout(()=>openModal("comment"), 180); });

    if (CONFIG.bump.autoEveryMs > 0){
      setInterval(() => {
        if (v.paused) return;
        if (Math.random() > CONFIG.bump.autoChance) return;
        const r = Math.random();
        if (r < 0.65) bump("like");
        else if (r < 0.85) bump("save");
        else bump("comment");
      }, CONFIG.bump.autoEveryMs);
    }

    // other actions
    btnSound.addEventListener("click", async (e) => {
      e.stopPropagation();
      v.muted = !v.muted;
      soundLabel.textContent = v.muted ? "mute" : "sound";
      btnSound.textContent = v.muted ? "🔇" : "🔊";
      if (!v.muted) await tryPlay();
    });
    btnFull.addEventListener("click", (e) => {
      e.stopPropagation();
      if (document.fullscreenElement) document.exitFullscreen?.();
      else v.requestFullscreen?.();
    });
    btnShare.addEventListener("click", async (e) => {
      e.stopPropagation();
      const shareData = { title: document.title, text: "Check this out", url: location.href };
      try{ if (navigator.share) await navigator.share(shareData); else openModal("default"); }catch(_){}
    });
    btnProfile.addEventListener("click", (e) => { e.stopPropagation(); location.href = CONFIG.twitterUrl; });
    floatingX.addEventListener("click", (e)=>{ e.stopPropagation(); location.href = CONFIG.twitterUrl; });

    const navClick = (e) => { e.stopPropagation(); openModal("nav"); };
    navHome.addEventListener("click", navClick);
    navBoost.addEventListener("click", navClick);
    navRank.addEventListener("click", navClick);
    navMsg.addEventListener("click", navClick);
    navAccount.addEventListener("click", navClick);

    topCta.addEventListener("click", (e)=>{ /* default */ });

    // =========================
    // ② コメント吹き出しロジック
    // =========================
    function relTime(){
      // 2〜59秒前っぽく見せる
      const s = randInt(2, 59);
      return `${s}秒前`;
    }
    function pick(arr){
      return arr[Math.floor(Math.random()*arr.length)];
    }
    function initials(name){
      // アバター丸の中の1文字
      // 例: ごくひちゃん推し -> ご
      return (name && name.trim().length) ? name.trim().slice(0,1) : "G";
    }

    function spawnComment(){
      if (!CONFIG.comments.enabled) return;
      // 再生中だけ
      if (v.paused) return;

      // 最大表示数
      const items = commentLayer.querySelectorAll(".cmt");
      if (items.length >= CONFIG.comments.maxOnScreen) {
        // 古いのを消す
        items[0]?.classList.add("cmtOut");
        setTimeout(()=>items[0]?.remove(), 320);
      }

      const name = pick(CONFIG.comments.names);
      const msg = pick(CONFIG.comments.messages);

      const el = document.createElement("div");
      el.className = "cmt";
      el.innerHTML = `
        <div class="cmtTop">
          <div class="cmtAvatar">${initials(name)}</div>
          <div class="cmtName">${name}</div>
          <div class="cmtTime">${relTime()}</div>
        </div>
        <div class="cmtBody">${msg}</div>
      `;
      commentLayer.appendChild(el);

      // しばらくしたら自然に消す
      setTimeout(() => {
        el.classList.add("cmtOut");
        setTimeout(()=> el.remove(), 360);
      }, CONFIG.comments.lifeMs);
    }

    function scheduleComments(){
      const min = CONFIG.comments.minIntervalMs;
      const max = CONFIG.comments.maxIntervalMs;
      const next = randInt(min, max);
      setTimeout(() => {
        spawnComment();
        scheduleComments();
      }, next);
    }
    if (CONFIG.comments.enabled) scheduleComments();

    // 初期
    setProgress();
  </script>
</body>
</html>
