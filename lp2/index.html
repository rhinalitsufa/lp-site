<!doctype html>
<html lang="ja">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta property="og:title" content="Full video">
<meta property="og:description" content="Watch full video">

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
padding:20px;
}

video{
width:100%;
max-width:420px;
}

button{
background:#ff2d75;
border:none;
padding:15px 30px;
font-size:18px;
color:#fff;
border-radius:10px;
margin-top:20px;
cursor:pointer;
}

.hide{
display:none;
}

</style>
</head>

<body>

<div id="lp1">

<h2>
動画の続きはこちら👇
</h2>

<video id="v1" autoplay muted playsinline>
<source src="video1.mp4" type="video/mp4">
</video>

<br>

<button id="nextBtn" class="hide" onclick="showLP2()">▶ 続きを見る</button>

<p>※先に年齢確認があります</p>

</div>


<div id="lp2" class="hide">

<h2>
この動画の元動画はこちら👇
</h2>

<video autoplay muted playsinline loop>
<source src="video2.mp4" type="video/mp4">
</video>

<br>

<button onclick="go()">▶ 見に行く</button>

</div>

<script>

let v=document.getElementById("v1")
let btn=document.getElementById("nextBtn")

// 3秒後ボタン表示
setTimeout(()=>{
btn.classList.remove("hide")
},3000)

// 7秒で停止
v.addEventListener("timeupdate",()=>{

if(v.currentTime>7){

v.pause()

}

})

// LP切替
function showLP2(){

document.getElementById("lp1").classList.add("hide")

document.getElementById("lp2").classList.remove("hide")

}

// 広告リンク
function go(){

window.location.href="https://ad-nex.com/u/aiacgdx3w5rq"

}

</script>

</body>
</html>
